<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#04080F" />
  <meta name="description" content="صُدَاكوين — العملة الرقمية السودانية" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <title>صُدَاكوين | SudaCoin</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: #04080F;
      font-family: 'Cairo', sans-serif;
      overflow-x: hidden;
    }
    /* Loading screen */
    #splash {
      position: fixed; inset: 0;
      background: #04080F;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashPulse 1.5s ease-in-out infinite;
    }
    .splash-title {
      font-size: 28px; font-weight: 900;
      color: #C9A84C; letter-spacing: 1px;
    }
    .splash-sub {
      font-size: 12px; color: #3A5070;
      letter-spacing: 3px;
    }
    .splash-bar {
      width: 120px; height: 3px;
      background: #0A1520; border-radius: 99px; overflow: hidden;
    }
    .splash-fill {
      height: 100%; background: linear-gradient(90deg, #C9A84C, #FFE082);
      border-radius: 99px;
      animation: splashLoad 1.8s ease-in-out forwards;
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes splashLoad {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <svg class="splash-logo" viewBox="0 0 48 48" fill="none">
      <defs>
        <radialGradient id="sg" cx="35%" cy="30%">
          <stop offset="0%" stop-color="#FFE082"/>
          <stop offset="55%" stop-color="#C9A84C"/>
          <stop offset="100%" stop-color="#6B4F00"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="22" fill="url(#sg)" stroke="#C9A84C" stroke-width="1"/>
      <text x="24" y="31" text-anchor="middle" font-size="21"
        fill="#1a0800" font-weight="bold" font-family="serif">ص</text>
    </svg>
    <div class="splash-title">صُدَاكوين</div>
    <div class="splash-sub">SUDACOIN</div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

  <!-- Entry -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Hide splash after load -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 400); }
      }, 1800);
    });
  </script>

</body>
</html>
